<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowPilot Example</title>
  </head>
  <body>
    <button data-guide-id="ui.btn_login">登录</button>

    <script src="../dist/flowpilot.umd.js"></script>
    <script>
      FlowPilot.init({
        workflow: {
          id: "demo",
          steps: [
            {
              step: 1,
              highlight: "ui.btn_login",
              action: "点击登录"
            }
          ]
        },
        mapping: {
          "ui.btn_login": {
            selector: "[data-guide-id='ui.btn_login']"
          }
        }
      })

      FlowPilot.start("demo")
    </script>
  </body>
</html>
